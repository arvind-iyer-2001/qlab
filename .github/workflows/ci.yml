name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv
        run: uv venv --python 3.12

      - name: Install dependencies
        run: uv pip install -r api/requirements.txt

      - name: Run tests
        run: uv run pytest -q
