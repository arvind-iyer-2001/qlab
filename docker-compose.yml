services:
  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB}
      PROBLEMS_DIR: /problems
      QLAB_JUDGE_TIMEOUT: ${QLAB_JUDGE_TIMEOUT:-10}
      QLAB_DOCKER_IMAGE: ${QLAB_DOCKER_IMAGE:-qlab-judge}
      # Default/host license as a base64 key, passed to judge containers via
      # the KDBLIC env var. Per-user licenses come from MongoDB at runtime.
      QLAB_LICENSE_B64: ${QLAB_LICENSE_B64}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
    volumes:
      - ./problems:/problems:ro
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
        NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL:-/auth/callback}
        NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL:-/auth/callback}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    ports:
      - "9091:9091"
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
